# Bioamla Project Configuration - Default Template
# Generated by: bioamla project init
#
# This is the default configuration template with balanced settings
# suitable for most bioacoustic analysis workflows.

# =============================================================================
# PROJECT METADATA
# Basic information about this project
# =============================================================================
[project]
name = ""
version = "1.0.0"
description = ""
created = ""

# =============================================================================
# AUDIO PROCESSING
# Settings for audio file preprocessing and conversion
# Used by: bioamla audio convert, bioamla audio segment
# =============================================================================
[audio]
sample_rate = 16000          # Target sample rate in Hz (16000 recommended for most models)
mono = true                  # Convert stereo to mono (required for most ML models)
normalize = false            # Normalize audio levels to [-1, 1]

# =============================================================================
# VISUALIZATION
# Settings for spectrogram and waveform generation
# Used by: bioamla visualize spectrogram, bioamla visualize waveform
# =============================================================================
[visualize]
type = "mel"                 # Spectrogram type: "mel", "stft", "mfcc", "waveform"
n_fft = 2048                 # FFT window size (larger = better freq resolution)
hop_length = 512             # Hop length between frames (smaller = better time resolution)
n_mels = 128                 # Number of mel bands (64-128 typical)
cmap = "magma"               # Colormap: "magma", "viridis", "plasma", "inferno"
dpi = 150                    # Output image resolution in dots per inch

# =============================================================================
# MODEL CONFIGURATION
# Default models for inference and embeddings
# Used by: bioamla models predict, bioamla models embed
# =============================================================================
[models]
default_ast_model = "MIT/ast-finetuned-audioset-10-10-0.4593"

# =============================================================================
# INFERENCE SETTINGS
# Settings for model prediction and classification
# Used by: bioamla models predict, bioamla batch predict
# =============================================================================
[inference]
batch_size = 8               # Number of samples per batch (adjust based on GPU memory)
use_fp16 = false             # Use half-precision (faster but less accurate)
top_k = 5                    # Number of top predictions to return
min_confidence = 0.01        # Minimum confidence threshold for predictions
clip_seconds = 10            # Audio clip duration for inference
overlap_seconds = 0          # Overlap between consecutive clips

# =============================================================================
# TRAINING SETTINGS
# Settings for model fine-tuning and training
# Used by: bioamla models train
# =============================================================================
[training]
learning_rate = 5.0e-5       # Initial learning rate (5e-5 typical for fine-tuning)
epochs = 10                  # Number of training epochs
batch_size = 16              # Training batch size (adjust based on GPU memory)
eval_strategy = "epoch"      # Evaluation frequency: "epoch", "steps", "no"
save_strategy = "epoch"      # Checkpoint save frequency: "epoch", "steps", "no"

# =============================================================================
# AUGMENTATION SETTINGS
# On-the-fly audio augmentation during training. Every layer is OFF by default;
# turn on only the ones you need (here, or with the matching --<layer> CLI flag).
# Ranges/probabilities apply only to layers that are enabled. CLI flags override
# these values.
# Used by: bioamla models ast train
# =============================================================================
[augmentation]
# --- Layers (each adds one audiomentations transform when true) ---
add_noise = false            # Add Gaussian noise (SNR range below)
time_stretch = false         # Stretch/compress time (rate range below)
pitch_shift = false          # Shift pitch (semitone range below)
gain = false                 # Random gain (dB range below)
gain_transition = false      # Smooth gain ramp (shares the gain dB range)
clipping_distortion = false  # Clipping distortion (percentile range below)

# --- Pipeline controls ---
probability = 0.8            # Chance the whole pipeline is applied to a sample (0-1)
multiplier = 1               # Repeat the train split N times with augmentation (1 = no copies)

# --- Per-layer ranges (only used by enabled layers) ---
min_snr_db = 10.0            # Gaussian noise: min SNR (dB)
max_snr_db = 20.0            # Gaussian noise: max SNR (dB)
min_time_stretch = 0.8       # Time stretch: min rate
max_time_stretch = 1.2       # Time stretch: max rate
min_pitch_shift = -4         # Pitch shift: min semitones
max_pitch_shift = 4          # Pitch shift: max semitones
min_gain_db = -6.0           # Gain / gain transition: min (dB)
max_gain_db = 6.0            # Gain / gain transition: max (dB)
clipping_probability = 0.5   # Clipping distortion: per-sample probability (0-1)
min_percentile_threshold = 0    # Clipping distortion: min percentile
max_percentile_threshold = 30   # Clipping distortion: max percentile

# =============================================================================
# OUTPUT SETTINGS
# Settings for result formatting and file output
# =============================================================================
[output]
format = "csv"               # Output format: "csv", "json", "parquet"
verbose = true               # Show detailed progress output
overwrite = false            # Overwrite existing output files

# =============================================================================
# LOGGING SETTINGS
# Settings for command history and logging
# Used by: bioamla log show, bioamla log stats
# =============================================================================
[logging]
level = "INFO"               # Log level: "DEBUG", "INFO", "WARNING", "ERROR"
max_history = 1000           # Maximum number of commands to keep in history
