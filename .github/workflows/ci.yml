name: CI

on:
  push:
    branches: [main, "dev-*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install ffmpeg (audio I/O backend)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install (all extras + dev)
        run: uv sync --all-extras

      - name: Lint
        run: uv run ruff check src tests

      - name: Format check
        run: uv run ruff format --check src tests

      - name: Test
        run: uv run pytest

  slim:
    name: slim-install import guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ffmpeg (audio I/O backend)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install core + dev only (no heavy extras)
        run: uv sync --extra dev

      - name: '`import bioamla` must not pull heavy modules'
        run: |
          uv run python - <<'PY'
          import sys
          import bioamla  # noqa: F401
          import bioamla.cli.cli  # noqa: F401
          eager = [m for m in ("torch", "transformers", "opensoundscape", "librosa", "numba") if m in sys.modules]
          assert not eager, f"slim import pulled heavy modules: {eager}"
          print("slim import OK; version", bioamla.__version__)
          PY

      - name: Test (optional-extra tests skip cleanly)
        run: uv run pytest
